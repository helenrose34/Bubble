<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Bubbles</title>
    
    <style>
        /* --- CSS STYLES --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Black background */
            overflow: hidden; /* Prevents scrollbars when bubbles go off-screen */
        }

        #bubble-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .bubble {
            position: absolute;
            bottom: -100px; /* Starts just below the screen */
            pointer-events: none; /* Allows mouse clicks to pass through */
            will-change: transform; /* Optimizes the animation performance */
        }

        /* The animation moves the bubble up by 120 viewport height.
           The rotation uses a CSS variable (--rotation) set by JavaScript. */
        @keyframes flyUp {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(-120vh) rotate(var(--rotation, 0deg));
            }
        }
    </style>
</head>
<body>

    <div id="bubble-container"></div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        const container = document.getElementById('bubble-container');

        function createBubble() {
            // 1. Create the image element
            const bubble = document.createElement('img');
            bubble.src = 'bubble.png'; // Your uploaded bubble image
            bubble.classList.add('bubble');

            // 2. Randomize Size (between 20px and 80px)
            const size = Math.random() * 60 + 20;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            // 3. Randomize Horizontal Position (0% to 100% of the screen width)
            bubble.style.left = `${Math.random() * 100}vw`;

            // 4. Randomize Opacity (between 0.2 and 1.0)
            bubble.style.opacity = Math.random() * 0.8 + 0.2;

            // 5. Randomize Animation Speed (between 4s and 10s to reach the top)
            const duration = Math.random() * 6 + 4; 

            // 6. Randomize Rotation (some rotate left, some right)
            const rotation = (Math.random() - 0.5) * 360; 
            bubble.style.setProperty('--rotation', `${rotation}deg`);

            // 7. Apply the animation to the bubble
            bubble.style.animation = `flyUp ${duration}s linear forwards`;

            // 8. Add the bubble to the screen
            container.appendChild(bubble);

            // 9. Clean up: Remove the bubble from the HTML after its animation finishes
            setTimeout(() => {
                bubble.remove();
            }, duration * 1000);
        }

        // Generate a new bubble every 300 milliseconds
        setInterval(createBubble, 300);
    </script>
</body>
</html>
