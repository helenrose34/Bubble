<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Bubbles - 3D Depth</title>
    
    <style>
        /* --- CSS STYLES --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Black background */
            overflow: hidden; /* Prevents scrollbars */
        }

        #bubble-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .bubble {
            position: absolute;
            /* Moved further down to hide the new, larger bubbles before they float up */
            bottom: -250px; 
            pointer-events: none; 
            will-change: transform; 
        }

        @keyframes flyUp {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(-130vh) rotate(var(--rotation, 0deg));
            }
        }
    </style>
</head>
<body>

    <div id="bubble-container"></div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        const container = document.getElementById('bubble-container');

        function createBubble() {
            const bubble = document.createElement('img');
            bubble.src = 'bubble.png'; 
            bubble.classList.add('bubble');

            // 1. Define Size Range (Increased overall size: 40px to 160px)
            const minSize = 40;
            const maxSize = 160;
            const size = Math.random() * (maxSize - minSize) + minSize;
            
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            // 2. Randomize Horizontal Position
            bubble.style.left = `${Math.random() * 100}vw`;

            // 3. Calculate "Depth" Ratio (0.0 is smallest, 1.0 is largest)
            const depthRatio = (size - minSize) / (maxSize - minSize);

            // 4. Tie Opacity to Size (Small = transparent, Big = fully opaque)
            // Minimum opacity is 0.15, scaling up to 1.0 based on how big it is
            const opacity = 0.15 + (depthRatio * 0.85);
            bubble.style.opacity = opacity;

            // 5. Tie Speed to Size (Small = slower, Big = faster) for 3D parallax effect
            // Base duration between 5s (fastest/biggest) and 12s (slowest/smallest)
            // Added a tiny bit of randomness so they don't move in perfect uniform sheets
            const duration = 12 - (depthRatio * 7) + (Math.random() * 2); 

            // 6. Randomize Rotation
            const rotation = (Math.random() - 0.5) * 360; 
            bubble.style.setProperty('--rotation', `${rotation}deg`);

            // 7. Apply the animation
            bubble.style.animation = `flyUp ${duration}s linear forwards`;

            container.appendChild(bubble);

            // 8. Clean up
            setTimeout(() => {
                bubble.remove();
            }, duration * 1000);
        }

        // Generate bubbles a bit slower (every 400ms) to avoid overcrowding with larger sizes
        setInterval(createBubble, 400);
    </script>
</body>
</html>
