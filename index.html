<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Bubbles - Blur Depth</title>
    
    <style>
        /* --- CSS STYLES --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Black background */
            overflow: hidden; /* Prevents scrollbars */
        }

        #bubble-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .bubble {
            position: absolute;
            bottom: -250px; /* Hides the large bubbles before they float up */
            pointer-events: none; 
            will-change: transform, filter; /* Optimizes performance for blur and movement */
        }

        @keyframes flyUp {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(-130vh) rotate(var(--rotation, 0deg));
            }
        }
    </style>
</head>
<body>

    <div id="bubble-container"></div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        const container = document.getElementById('bubble-container');

        function createBubble() {
            const bubble = document.createElement('img');
            bubble.src = 'bubble.png'; 
            bubble.classList.add('bubble');

            // 1. Define Size Range 
            const minSize = 40;
            const maxSize = 160;
            const size = Math.random() * (maxSize - minSize) + minSize;
            
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            // 2. Randomize Horizontal Position
            bubble.style.left = `${Math.random() * 100}vw`;

            // 3. Calculate "Depth" Ratio (0.0 is smallest, 1.0 is largest)
            const depthRatio = (size - minSize) / (maxSize - minSize);

            // 4. Tie Blur to Size (Small = blurry, Big = sharp)
            // We invert the ratio so that a small depth ratio creates a high blur amount.
            // Maximum blur is set to 8px.
            const blurAmount = (1 - depthRatio) * 8;
            bubble.style.filter = `blur(${blurAmount}px)`;

            // Ensure larger foreground bubbles always overlap smaller background bubbles
            bubble.style.zIndex = Math.round(size);

            // 5. Tie Speed to Size (Small = slower, Big = faster)
            const duration = 12 - (depthRatio * 7) + (Math.random() * 2); 

            // 6. Randomize Rotation
            const rotation = (Math.random() - 0.5) * 360; 
            bubble.style.setProperty('--rotation', `${rotation}deg`);

            // 7. Apply the animation
            bubble.style.animation = `flyUp ${duration}s linear forwards`;

            container.appendChild(bubble);

            // 8. Clean up to prevent lag
            setTimeout(() => {
                bubble.remove();
            }, duration * 1000);
        }

        // Generate bubbles every 400ms
        setInterval(createBubble, 400);
    </script>
</body>
</html>
